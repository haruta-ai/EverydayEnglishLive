<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f8fb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="English Live">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png?v=021">
  <link rel="stylesheet" href="style.css?v=030">
  <title>Everyday English Live</title>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="icon-button" id="menuButton" aria-label="メニュー">☰</button>
      <div>
        <h1 id="characterName">Mike <span>● Online</span></h1>
        <p>Your English friend</p>
      </div>
      <button class="switch-button" id="switchCharacter">Sophieに変更</button>
      <button class="voice-button" id="voiceButton" aria-label="声を変更">声</button>
    </header>

    <section class="video-card">
      <img id="characterImage" src="mike-neutral.jpg?v=022" alt="Mike">
      <div class="live-pill">▥ 会話中</div>
      <div class="character-caption">
        <strong id="captionName">Mike</strong>
        <span id="captionMood">Relaxed & friendly</span>
      </div>
    </section>

    <section class="conversation-panel">
      <section class="chat" id="chat" aria-live="polite"></section>
      <section class="suggestions" id="suggestions"></section>
    </section>

    <form class="composer" id="composer">
      <input id="textInput" type="text" autocomplete="off" placeholder="英語で入力してもOK">
      <button type="submit" class="send-button">送信</button>
      <button type="button" class="mic-button" id="micButton" aria-label="音声入力">🎙</button>
    </form>

    <p class="status" id="status">回答例をタップするか、マイクで話してください。</p>
  </main>
  <script src="script.js?v=030"></script>
</body>
</html>
